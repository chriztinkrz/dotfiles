source = ~/.cache/hellwal/hyprland.conf

# #######################################################################################
# AUTOGENERATED HYPRLAND CONFIG.
# EDIT THIS CONFIG ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

autogenerated = 0 # remove this line to remove the warning

# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf


################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
monitor=eDP-1,1920x1080@60,0x0,0.83


#################
### AUTOSTART ###
#################

exec-once = hyprctl setcursor ComixCursors-Black 40
exec-once = ~/.config/hypr/scripts/startup_script.sh
exec-once = avizo-service
exec-once = wl-paste --watch cliphist store
exec-once = input-remapper-control --command autoload


#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24


###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 5
    gaps_out = 5
    border_size = 4
    col.active_border = $color7
    col.inactive_border = $color1

    resize_on_border = false
    allow_tearing = false

    layout = scrolling
}

decoration {

    # rounding
    rounding = 6
    rounding_power = 3

    # opacity
    active_opacity = 1.0
    inactive_opacity = 0.9

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 4
        passes = 2
        ignore_opacity = true
        vibrancy = 0.1696
    }
}


animations {
    enabled = yes, please :)

    # animation curves
    bezier = wind, 0.2, 0.6, 0.1, 1.05
    bezier = wind2, 0.05, 1.1, 0.1, 1.5
    bezier = winIn, 0.1, 1.1, 0.1, 1.1
    bezier = liner, 1, 1, 1, 1
    bezier = md3_decel, 0.05, 0.7, 0.1, 1
    bezier = menu_decel, 0.1, 1, 0, 1
    bezier = menu_accel, 0.38, 0.04, 1, 0.07
    bezier = workspace, 0.22, 1, 0.36, 1.05
    bezier = winClose, 0.8, 1, 0.9, 1.05
    bezier = spring, 0.45, 1.25, 0.45, 1.15
    
    # animation configs
    animation = border, 1, 1, liner
    animation = borderangle, 1, 30, liner, loop
    animation = windows, 1, 2, wind, slide
    animation = windowsIn, 1, 15, winIn, slide
    animation = windowsOut, 1, 20, winClose, slide bottom
    animation = windowsMove, 1, 25, wind, popins

    animation = fade, 1, 3, md3_decel
    animation = layersIn, 1, 8, menu_decel, slide
    animation = layersOut, 1, 8, menu_decel, slide
    animation = fadeLayersIn, 1, 2, menu_decel
    animation = fadeLayersOut, 1, 4.5, menu_accel
    animation = workspaces, 1, 10, workspace, slidevert
}

# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule {
#     name = no-gaps-wtv1
#     match:float = false
#     match:workspace = w[tv1]
#
#     border_size = 0
#     rounding = 0
# }
#
# windowrule {
#     name = no-gaps-f1
#     match:float = false
#     match:workspace = f[1]
#
#     border_size = 0
#     rounding = 0
# }

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

scrolling {
    column_width = 0.3333
    explicit_column_widths = 0.3333,0.5,0.667
    follow_min_visible = 0.15
    direction = right
    fullscreen_on_one_column = false
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = -0.68 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
    }
}

device {
    name = syna30b0:00-06cb:ce08
    sensitivity = 1.0
    accel_profile = flat
}

###################
### KEYBINDINGS ###
###################

bind = CTRL SHIFT, Z, killactive,
bind = SUPER, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit

# focus window
bind = ALT, A, movefocus, l
bind = ALT, D, movefocus, r
bind = ALT, W, movefocus, u
bind = ALT, S, movefocus, d

# switch workspace by number
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10
bind = SUPER, Z, workspace, empty

# switch workspaces relatively
binde = SUPER, W, workspace, r-1
binde = SUPER, S, workspace, r+1
bind = SUPER, Tab, workspace, previous
binde = SUPER CTRL SHIFT ALT, X, exec, .config/hypr/scripts/next_workspace.sh
binde = SUPER CTRL SHIFT ALT, Z, exec, .config/hypr/scripts/previous_workspace.sh

# move window to workspace
bind = CTRL SHIFT, 1, movetoworkspace, 1
bind = CTRL SHIFT, 2, movetoworkspace, 2
bind = CTRL SHIFT, 3, movetoworkspace, 3
bind = CTRL SHIFT, 4, movetoworkspace, 4
bind = CTRL SHIFT, 5, movetoworkspace, 5
bind = CTRL SHIFT, 6, movetoworkspace, 6
bind = CTRL SHIFT, 7, movetoworkspace, 7
bind = CTRL SHIFT, 8, movetoworkspace, 8
bind = CTRL SHIFT, 9, movetoworkspace, 9
bind = CTRL SHIFT, 0, movetoworkspace, 10
bind = SUPER SHIFT, W, movetoworkspace, -1
bind = SUPER SHIFT, S, movetoworkspace, +1
bind = SUPER SHIFT, Z, movetoworkspace, empty

# move window
bind = CTRL SHIFT, A, layoutmsg, swapcol l
bind = CTRL SHIFT, D, layoutmsg, swapcol r
bind = CTRL SHIFT, W, movewindow, u
bind = CTRL SHIFT, S, movewindow, d

# some layout thingies 
bind = SUPER CTRL, X, layoutmsg, fit visible
bind = SUPER CTRL, Z, layoutmsg, fit all
bind = SUPER CTRL, A, layoutmsg, fit tobeg
bind = SUPER CTRL, S, layoutmsg, fit toend
bind = SUPER, A, exec, hyprctl dispatch focuswindow address:$(hyprctl clients -j | jq -r '[.[] | select(.workspace.id == '$(hyprctl activeworkspace -j | jq .id)') ] | sort_by(.at[0]) | first | .address')
bind = SUPER, D, exec, hyprctl dispatch focuswindow address:$(hyprctl clients -j | jq -r '[.[] | select(.workspace.id == '$(hyprctl activeworkspace -j | jq .id)') ] | sort_by(.at[0]) | last | .address')
bind = SUPER, T, togglefloating
bind = SUPER SHIFT, T, cyclenext, tiled
bind = SUPER, F, fullscreen, 0
bind = SUPER, Q, exec, hyprctl keyword general:layout "$(hyprctl getoption general:layout | grep -q 'scrolling' && echo 'dwindle' || echo 'scrolling')"


# resize window
bind = SUPER CTRL SHIFT, Z, layoutmsg, colresize +conf
bind = SUPER CTRL, D, layoutmsg, colresize +0.03
bind = SUPER CTRL, A, layoutmsg, colresize -0.03
bind = SUPER CTRL SHIFT, X, layoutmsg, fit active

# scratchpad, not using personally
# bind = SUPER, S, togglespecialworkspace, magic
# bind = SUPER SHIFT, S, movetoworkspace, special:magic

# scroll through workspaces with super mousescroll
bind = SUPER, mouse_up, workspace, r+1
bind = SUPER, mouse_down, workspace, r-1

# move/resize window with mouse buttons
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# laptop keys for audio/brightness
bindel = ,XF86AudioRaiseVolume, exec, volumectl -u up
bindel = ,XF86AudioLowerVolume, exec, volumectl -u down
# bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
# bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, lightctl up
bindel = ,XF86MonBrightnessDown, exec, lightctl down

# rofi stuff
bind = SUPER, V, exec, ~/.config/rofi/scripts/clipboard.sh
bind = SUPER SHIFT, V, exec, rofi -modi emoji -show emoji -theme-str 'listview {lines: 10;}' -theme-str 'window {width: 30%;}'
bind = SUPER, ESCAPE, exec, rofi-power
bind = SUPER SHIFT, C, exec, rofi -show calc -theme-str 'window { width: 15%; }' -theme-str 'listview {lines: 1;}'
bind = SUPER SHIFT, B, exec, ~/.config/rofi/scripts/rofi-bluetooth-claude.sh
bind = ALT CTRL, S, exec, ~/.config/rofi/scripts/select-audio.sh
bind = SUPER, SPACE, exec, rofi -show drun -theme-str 'listview {lines: 10;}' -theme-str 'window {width: 17%;}'
bind = SUPER, GRAVE, exec, ~/.config/rofi/scripts/wallpaper-rofi-2.sh
bind = SUPER ALT, E, exec, ~/.config/rofi/scripts/file-selector/rofi-file-selector.sh

# other stuff to escape quickshell
bind = SUPER, L, exec, hyprlock
bind = SUPER, N, exec, makoctl dismiss -a
bind = SUPER, F5, exec, gpu-screen-recorder -w screen -f 60 -fm cfr -k h264 -c mp4 -a $(pactl get-default-sink).monitor -o ~/Videos/$(date +%d.%m.%Y_%I:%M%p).mp4 & notify-send 'recording started'
bind = SUPER, F4, exec, pkill -INT -f gpu-screen-recorder && notify-send 'recording stopped'

# audio and brightness controls
bindle = ALT, F2, exec, volumectl -u up
bindle = ALT, F1, exec, volumectl -u down
bindl = , F2, exec, playerctl play-pause
bindl = , F1, exec, playerctl previous
bindl = , F3, exec, playerctl next
bindle = SHIFT, F2, exec, lightctl up
bindle = SHIFT, F1, exec, lightctl down

# applications
bind = SUPER, RETURN, exec, foot
bind = SUPER, B, exec, zen-beta
bind = SUPER, E, exec, nautilus --new-window

# zoom mouse version
bind = SUPER SHIFT, mouse_down, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | awk '/^float.*/ {print $2 * 1.1}')
bind = SUPER SHIFT, mouse_up, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | awk '/^float.*/ {print $2 * 0.9}')

# zoom kb version
binde = SUPER, equal, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | awk '/^float.*/ {print $2 * 1.1}')
binde = SUPER, minus, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | awk '/^float.*/ {print $2 * 0.9}')

# screenshot
bind = SUPER, F8, exec, hyprshot -m output -o ~/Pictures/Screenshots -f "$(date +'%d.%m.%Y %I:%M %p').png"
bind = SUPER, F7, exec, hyprshot -m region -o ~/Pictures/Screenshots -f "$(date +'%d.%m.%Y %I:%M %p').png"
bind = SUPER, F6, exec, hyprshot -m window -o ~/Pictures/Screenshots -f "$(date +'%d.%m.%Y %I:%M %p').png"

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrules that are useful

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}
windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}
# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}
windowrule {
    name = foot blur and opacity
    match:class = foot
    opacity = 0.75 0.7
}

misc {
    focus_on_activate = true
    animate_manual_resizes = true
}
